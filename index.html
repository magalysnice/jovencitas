<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo VIP</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b141a;
    }

    .chat-container {
      max-width: 500px;
      margin: auto;
      background: #111b21;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #202c33;
      padding: 15px;
      color: white;
      font-weight: bold;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message {
      background: #202c33;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      color: white;
      max-width: 80%;
    }

    .message.user {
      background: #005c4b;
      align-self: flex-end;
    }

    .button {
      background: #25d366;
      color: black;
      padding: 12px;
      text-align: center;
      margin: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .progress {
      color: white;
      text-align: center;
      padding: 10px;
    }

    video {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">Grupo VIP 🔒</div>

  <div class="messages">

    <div class="message">😳 No todos están viendo esto...</div>
    <div class="message user">¿Es real?</div>
    <div class="message">Ya más de 2,000 personas entraron 🔥</div>
    <div class="message">Mira esto antes de que lo borren 👇</div>

    <div class="message">
      <video src="https://gruposycanales.website/wp-content/uploads/2026/03/video_360p.mp4" width="100%" controls onclick="redirect()"></video>
    </div>

    <div class="message">⚠️ Acceso limitado</div>

    <div class="progress" id="progress">
      Compartido: 0 / 3 grupos
    </div>

  </div>

  <div class="button" id="actionBtn" onclick="shareWhatsApp()">
    Compartir en WhatsApp
  </div>
</div>

<script>
  let shares = 0;
  const targetLink = "https://tuenlace.com";

  function shareWhatsApp() {
    const message = encodeURIComponent(
      "🔥 Mira esto ahora antes de que lo borren 👉 " + window.location.href
    );

    window.open(`https://wa.me/?text=${message}`, "_blank");

    shares++;
    document.getElementById("progress").innerText =
      `Compartido: ${shares} / 3 grupos`;

    if (shares >= 3) {
      document.getElementById("actionBtn").innerText =
        "Entrar al grupo premium 🔥";
      document.getElementById("actionBtn").onclick = () => {
        window.location.href = targetLink;
      };
    }
  }

  function redirect() {
    window.location.href = targetLink;
  }

  // Redirección al dar atrás
  history.pushState(null, "", location.href);
  window.onpopstate = function () {
    window.location.href = targetLink;
  };
</script>

</body>
</html>
